x-backend-build: &backend-build
  context: ./backend

x-runtime-env-file: &runtime-env-file
  - path: ./.env/runtime.env
    required: false

x-backend-environment: &backend-environment
  APP_ENV: development
  FRONTEND_URL: http://localhost:3000
  BACKEND_URL: http://localhost:8000
  DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/persona_memory
  REDIS_URL: redis://redis:6379/0
  MINIO_ENDPOINT: minio:9000
  MINIO_BUCKET: persona-memory
  JWT_SECRET: change-me

x-mock-worker-command: &mock-worker-command
  - python
  - -c
  - |
    import os
    import time

    from app.worker import provider_gateway

    queue = os.environ.get("WORKER_QUEUE", "mock")
    print(f"mock worker ready: {queue}; provider={provider_gateway.__class__.__name__}", flush=True)
    while True:
        time.sleep(3600)

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: persona_memory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d persona_memory"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build: *backend-build
    image: persona-memory-agent-backend:local
    env_file: *runtime-env-file
    environment: *backend-environment
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    image: persona-memory-agent-frontend:local
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  worker-text:
    build: *backend-build
    image: persona-memory-agent-backend:local
    command: *mock-worker-command
    env_file: *runtime-env-file
    environment:
      <<: *backend-environment
      WORKER_QUEUE: text
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker-media:
    build: *backend-build
    image: persona-memory-agent-backend:local
    command: *mock-worker-command
    env_file: *runtime-env-file
    environment:
      <<: *backend-environment
      WORKER_QUEUE: media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker-voice:
    build: *backend-build
    image: persona-memory-agent-backend:local
    command: *mock-worker-command
    env_file: *runtime-env-file
    environment:
      <<: *backend-environment
      WORKER_QUEUE: voice
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker-avatar:
    build: *backend-build
    image: persona-memory-agent-backend:local
    command: *mock-worker-command
    env_file: *runtime-env-file
    environment:
      <<: *backend-environment
      WORKER_QUEUE: avatar
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  postgres-data:
  minio-data:
